app-id: org.selfprivacy.app
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: selfprivacy
finish-args:
  - "--share=ipc"
  - "--socket=x11"
  - "--socket=fallback-x11"
  - "--socket=wayland"
  - "--share=network"
  - "--own-name=org.selfprivacy.app"
  - "--device=dri"
  - "--talk-name=org.freedesktop.secrets"
  - "--talk-name=org.freedesktop.portal.*"
modules:
  - name: selfprivacy
    buildsystem: simple
    build-commands:
      - install -Dm644 selfprivacy.svg /app/share/icons/hicolor/scalable/apps/selfprivacy.svg
      - install -Dm644 selfprivacy.png /app/share/icons/hicolor/512x512/apps/selfprivacy.png
      - install -Dm644 selfprivacy.desktop /app/share/applications/selfprivacy.desktop
      - install -Dm644 selfprivacy.metainfo.xml /app/share/metainfo/selfprivacy.metainfo.xml
      - cp -pr * /app
    sources:
      - type: dir
        path: vendor/

  - name: libsecret
    buildsystem: meson
    config-opts:
      - "-Dvapi=false"
      - "-Dgtk_doc=false"
    sources:
      - type: dir
        path: libsecret

  - name: libjsoncpp
    buildsystem: meson
    config-opts:
      - "--buildtype=release"
      - "--default-library=shared"
    sources:
      - type: dir
        path: libjsoncpp
