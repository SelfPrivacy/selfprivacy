name: Test CI

on:
  push:
    branches:
      - master
      - bttmchnd/ci-rehaul
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  test-linux:
    runs-on:
      - linux:host

    steps:
      - run: nix run .#test-flutter

  test-android:
    runs-on:
      - linux:host

    steps:
      - run: nix run .#test-flutter


  test-macos:
    runs-on:
      - macos:host

    steps:
      - run: nix run .#test-flutter


  test-ios:
    runs-on:
      - macos:host

    steps:
      - run: nix run .#test-flutter


  test-windows:
    runs-on:
      - windows:host

    steps:
      - run: |
             flutter config --no-analytics
             flutter config --enable-windows-desktop
             flutter test --coverage
