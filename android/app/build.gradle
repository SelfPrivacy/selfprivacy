plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def pubspecFile = rootProject.file('../pubspec.yaml')
def pubspecVersion = (pubspecFile.text =~ /(?m)^version:\s*(\S+)/)[0][1]
def pubspecParts = pubspecVersion.split('\\+')
def pubspecVersionName = pubspecParts[0]
def pubspecVersionCode = pubspecParts.length > 1 ? pubspecParts[1].toInteger() : 1

android {
    namespace 'org.selfprivacy.app'
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    compileOptions {
      sourceCompatibility JavaVersion.VERSION_17
      targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
      jvmTarget = JavaVersion.VERSION_17
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    lintOptions {
        disable 'InvalidPackage'
    }

    defaultConfig {
        applicationId "org.selfprivacy.app"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        compileSdkVersion 36
        versionCode pubspecVersionCode
        versionName pubspecVersionName
    }

    buildTypes {
        debug {

        }
        profile {

        }
        release {

        }
    }
    buildFeatures {
        flavorDimensions = ["default"]
    }


    productFlavors {
        fdroid {
            dimension 'default'
            applicationId "pro.kherel.selfprivacy"
        }
        production {
            dimension 'default'
        }
        nightly {
            dimension 'default'
            applicationIdSuffix ".nightly"
            versionCode project.getVersionCode()
            versionName "nightly-" + project.getVersionCode()
        }
    }
}

flutter {
    source '../..'
}

dependencies {
  implementation 'com.google.errorprone:error_prone_annotations:2.36.0' // required by flutter_secure_storage
  implementation 'com.github.spotbugs:spotbugs-annotations:4.8.6' // required by flutter_secure_storage
}

tasks.register("assembleProductionAll") {
    dependsOn "assembleProductionRelease", "assembleProductionDebug"
}
