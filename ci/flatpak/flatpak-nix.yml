app-id: org.selfprivacy.app
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: org.selfprivacy.app
rename-desktop-file: selfprivacy.desktop
rename-appdata-file: selfprivacy.metainfo.xml
rename-icon: selfprivacy
finish-args:
  - "--share=network"
  - "--share=ipc"
  - "--socket=x11"
  - "--socket=fallback-x11"
  - "--socket=wayland"
  - "--device=dri"
modules:
  - name: selfprivacy
    buildsystem: simple
    build-commands:
      - install -Dm644 selfprivacy.svg /app/share/icons/hicolor/scalable/apps/selfprivacy.svg
      - install -Dm644 selfprivacy.png /app/share/icons/hicolor/512x512/apps/selfprivacy.png
      - install -Dm644 selfprivacy.desktop /app/share/applications/selfprivacy.desktop
      - install -Dm644 selfprivacy.metainfo.xml /app/share/metainfo/selfprivacy.metainfo.xml
      - cp -pr * /app
      - ln -sr /app/bin/selfprivacy /app/bin/org.selfprivacy.app
    sources:
      - type: dir
        path: vendor/

  - name: libjsoncpp
    buildsystem: meson
    config-opts:
      - "--buildtype=release"
      - "--default-library=shared"
    sources:
      - type: dir
        path: libjsoncpp
