name: Generic CI

on:
  push:
    branches:
      - master
      - bttmchnd/ci-rehaul
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  analyze:
    runs-on:
      - linux:host

    steps:
      - run: nix run .#analyze-flutter

  scan:
    runs-on:
      - linux:host

    steps:
      - run: nix run .#scan-sonarcube
